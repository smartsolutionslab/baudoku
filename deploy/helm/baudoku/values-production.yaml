global:
  image:
    pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-credentials

services:
  projectsApi:
    replicaCount: 2
    env:
      - name: ASPNETCORE_ENVIRONMENT
        value: Production
      - name: ConnectionStrings__ProjectsDb
        valueFrom:
          secretKeyRef:
            name: baudoku-db-credentials
            key: projects-connection-string

  documentationApi:
    replicaCount: 2
    env:
      - name: ASPNETCORE_ENVIRONMENT
        value: Production
      - name: ConnectionStrings__DocumentationDb
        valueFrom:
          secretKeyRef:
            name: baudoku-db-credentials
            key: documentation-connection-string

  syncApi:
    replicaCount: 2
    env:
      - name: ASPNETCORE_ENVIRONMENT
        value: Production
      - name: ConnectionStrings__SyncDb
        valueFrom:
          secretKeyRef:
            name: baudoku-db-credentials
            key: sync-connection-string

  apiGateway:
    replicaCount: 2
    env:
      - name: ASPNETCORE_ENVIRONMENT
        value: Production

ingress:
  enabled: true
  className: nginx
  host: baudoku.apps.smartsolutionslab.tech
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: baudoku-production-tls
      hosts:
        - baudoku.apps.smartsolutionslab.tech

dashboard:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  auth:
    browserToken: true
    secretName: baudoku-dashboard-auth
    secretKey: browser-token
  ingress:
    enabled: true
    host: monitoring.baudoku.apps.smartsolutionslab.tech
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: baudoku-monitoring-production-tls
        hosts:
          - monitoring.baudoku.apps.smartsolutionslab.tech

otel:
  enabled: true
  endpoint: http://otel-collector:4317

monitoring:
  enabled: true

  prometheus:
    retention: 30d
    storage:
      size: 50Gi

  tempo:
    retention: 720h
    storage:
      size: 50Gi

  loki:
    retention: 720h
    storage:
      size: 50Gi

  grafana:
    ingress:
      enabled: true
      host: grafana.baudoku.apps.smartsolutionslab.tech
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
        - secretName: baudoku-grafana-production-tls
          hosts:
            - grafana.baudoku.apps.smartsolutionslab.tech
