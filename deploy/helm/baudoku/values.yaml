global:
  image:
    registry: ghcr.io
    prefix: smartsolutionslab/baudoku
    tag: latest
    pullPolicy: IfNotPresent
  imagePullSecrets: []

services:
  projectsApi:
    name: projects-api
    replicaCount: 1
    image:
      name: projects-api
    port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env: []

  documentationApi:
    name: documentation-api
    replicaCount: 1
    image:
      name: documentation-api
    port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env: []

  syncApi:
    name: sync-api
    replicaCount: 1
    image:
      name: sync-api
    port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env: []

  apiGateway:
    name: api-gateway
    replicaCount: 1
    image:
      name: api-gateway
    port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    env: []

  web:
    name: web
    replicaCount: 1
    image:
      name: web
    port: 80
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 64Mi
    env: []

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: baudoku.apps.smartsolutionslab.tech
  tls: []

dashboard:
  enabled: false
  image:
    repository: mcr.microsoft.com/dotnet/aspire-dashboard
    tag: "13.1"
    pullPolicy: IfNotPresent
  auth:
    browserToken: false
    secretName: baudoku-dashboard-auth
    secretKey: browser-token
  ingress:
    enabled: false
    host: monitoring.baudoku.apps.smartsolutionslab.tech
    annotations: {}
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

migrationRunner:
  image:
    name: migration-runner
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

otel:
  enabled: false
  endpoint: ""

monitoring:
  enabled: false

  otelCollector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.120.0"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  prometheus:
    image:
      repository: prom/prometheus
      tag: v3.2.1
      pullPolicy: IfNotPresent
    retention: 7d
    storage:
      size: 10Gi
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  tempo:
    image:
      repository: grafana/tempo
      tag: "2.7.1"
      pullPolicy: IfNotPresent
    retention: 168h
    storage:
      size: 10Gi
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  loki:
    image:
      repository: grafana/loki
      tag: "3.4.2"
      pullPolicy: IfNotPresent
    retention: 168h
    storage:
      size: 10Gi
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  grafana:
    image:
      repository: grafana/grafana
      tag: "11.5.2"
      pullPolicy: IfNotPresent
    auth:
      secretName: grafana-admin-credentials
      secretKey: admin-password
    ingress:
      enabled: false
      host: grafana.baudoku.apps.smartsolutionslab.tech
      annotations: {}
      tls: []
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
