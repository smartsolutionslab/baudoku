# OpenTelemetry Collector config — fan-out hub for BauDoku observability.
# Receives OTLP from .NET services, forwards to Aspire Dashboard + Grafana stack.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  resource:
    attributes:
      - key: service.namespace
        value: baudoku
        action: upsert

exporters:
  # Forward all signals to Aspire Dashboard
  otlp/aspire:
    endpoint: aspire-dashboard:18889
    tls:
      insecure: true

  # Forward traces to Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Forward logs to Loki via OTLP
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Expose metrics for Prometheus scraping
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/aspire, otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/aspire, prometheus]

    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/aspire, otlphttp/loki]
